apply plugin: 'com.android.application'

android {
    namespace "com.nls.entertainment"
    compileSdk 34
    defaultConfig {
        applicationId "com.nls.entertainment.app"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // Esto es lo que soluciona el error de Capacitor
    implementation "com.capacitorjs:android:5.7.0"
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
