      - name: Build APK
        run: |
          npm install
          npx cap add android
          npx cap sync
          
          cd android
          
          # 1. Forzar propiedades de AndroidX
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Inyectar la solución de duplicados al final del build.gradle principal
          # Usamos un formato de una sola línea para evitar errores de sintaxis en el YAML
          echo -e "\nconfigurations.all {\n    resolutionStrategy.eachDependency { details ->\n        if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('jdk')) {\n            details.useVersion '1.8.22'\n        }\n    }\n}" >> build.gradle

          # 3. Compilar
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
