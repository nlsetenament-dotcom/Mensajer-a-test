      - name: Build APK
        run: |
          # 1. Instalar dependencias y generar la carpeta android
          npm install
          npx cap add android
          npx cap copy
          npx cap sync

          cd android
          
          # 2. CREAR EL ARREGLO PARA LAS CLASES DUPLICADAS (Directo al archivo)
          # Esto le dice a Gradle que ignore las versiones viejas de Kotlin
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin' && 
                     (details.requested.name.contains('jdk7') || details.requested.name.contains('jdk8'))) {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> build.gradle

          # 3. Dar permisos y compilar
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
