      - name: Build APK
        run: |
          cd android
          # 1. Forzamos la resolución de conflictos de Kotlin en el archivo gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties
          
          # 2. Truco para eliminar las librerías duplicadas de Kotlin (Stdlib-jdk7/8)
          sed -i 's/dependencies {/dependencies {\n    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("replaces old jdk7") }\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("replaces old jdk8") }\n    }/' app/build.gradle

          # 3. Ejecutar la compilación
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
